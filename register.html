<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="top"></div>
  
<section class="section container">
  <div class="glass card" style="max-width:480px;margin:auto">
    <h2>إنشاء حساب</h2>
    <div class="form">
      <input id="name" placeholder="الاسم">
      <input id="email" type="email" placeholder="البريد الإلكتروني">
      <input id="password" type="password" placeholder="كلمة المرور">
      <button class="btn" onclick="register()">إنشاء حساب</button>
      <button class="btn dark" onclick="signInWithGoogle()" type="button">التسجيل باستخدام Google</button>
      <p class="muted">عندك حساب؟ <a href="login.html">دخول</a></p>
    </div>
  </div>
</section>

  <div id="foot"></div>
  <div id="toast" class="toast"></div>
  <script>
    document.getElementById("top").innerHTML = header("account");
    document.getElementById("foot").innerHTML = footer();
  </script>
  
<script>
async function register() {
  const mail = email.value.trim().toLowerCase();

  if (!name.value.trim()) return toast("اكتبي الاسم");
  if (!mail) return toast("اكتبي البريد");
  if (password.value.length < 6) return toast("كلمة المرور لازم 6 حروف أو أكثر");

  const ban = await checkBannedEmail(mail);
  if (ban.banned) return alert("هذا البريد محظور.
السبب: " + ban.reason);

  const { error } = await client.auth.signUp({
    email: mail,
    password: password.value,
    options: {
      data: { name: name.value.trim() },
      emailRedirectTo: location.origin + "/account.html"
    }
  });

  if (error) return alert(error.message);
  alert("تم إنشاء الحساب. افتحي رابط التأكيد من البريد الإلكتروني.");
}
</script>

</body>
</html>
