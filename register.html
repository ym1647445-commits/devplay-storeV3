<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#f4f4ff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
direction:rtl;
}

.box{
background:white;
padding:25px;
width:320px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#6c3df4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>إنشاء حساب</h2>

<input type="text" id="name" placeholder="الاسم">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء الحساب</button>

</div>

<script>

const supabaseUrl = 'https://bwtchfidnvlwyikhawua.supabase.co'

const supabaseKey = 'sb_publishable_u-jJWO8AsVfgxbSTXk_l8A_ldRMy4o2'

const client = supabase.createClient(supabaseUrl, supabaseKey)

async function register(){

const name = document.getElementById('name').value

const email = document.getElementById('email').value

const password = document.getElementById('password').value

const { data, error } = await client.auth.signUp({

email,
password,

options:{
data:{
name:name
}
}

})

if(error){

alert(error.message)

}else{

alert("تم إنشاء الحساب ❤️ تحقق من بريدك الإلكتروني")

window.location.href="login.html"

}

}

</script>

</body>
</html>
