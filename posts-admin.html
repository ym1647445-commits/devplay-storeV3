<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إدارة العروض</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><section class="section container"><div class="glass card" id="guard"><h2>دخول الإدارة</h2><input id="pass" type="password" placeholder="كلمة السر"><button class="btn" onclick="enter()">دخول</button></div><div id="panel" style="display:none"><div class="glass card"><h2>نشر عرض / إشعار</h2><select id="type"><option value="offer">عرض</option><option value="notice">إشعار</option></select><input id="title" placeholder="العنوان"><textarea id="message" rows="4" placeholder="التفاصيل"></textarea><button class="btn" onclick="addPost()">نشر</button></div><div class="grid" id="posts"></div></div></section><div id="foot"></div><div id="toast" class="toast"></div><script>top.innerHTML=header("admin");foot.innerHTML=footer();</script><script>function enter(){if(pass.value!==ADMIN_PASSWORD)return alert("كلمة السر غلط");guard.style.display="none";panel.style.display="block";loadPosts()}async function addPost(){const {error}=await client.from("posts").insert([{type:type.value,title:title.value,message:message.value}]);if(error)return alert(error.message);toast("تم النشر");loadPosts()}async function loadPosts(){const {data}=await client.from("posts").select("*").order("created_at",{ascending:false});posts.innerHTML=(data||[]).map(p=>`<div class="card glass"><span class="badge">${p.type}</span><h3>${p.title}</h3><p class="muted">${p.message}</p></div>`).join("")}</script></body></html>
