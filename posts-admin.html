<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة العروض - DevPlay</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="config.js"></script>
<style>
body{font-family:Tahoma;background:#f5f6fb;margin:0;color:#111827}
.box{max-width:850px;margin:35px auto;background:white;padding:25px;border-radius:24px;box-shadow:0 10px 30px #0001}
input,textarea,select{width:100%;padding:13px;margin-top:10px;border:1px solid #ddd;border-radius:13px}
button{background:#5b35f5;color:white;border:0;padding:13px 20px;border-radius:13px;margin-top:12px;cursor:pointer;font-weight:bold}
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:18px;padding:15px;margin-top:12px}
</style>
</head>
<body>

<div class="box">
<h1>إدارة العروض والإشعارات</h1>

<select id="type">
<option value="offer">عرض</option>
<option value="notice">إشعار</option>
</select>

<input id="title" placeholder="عنوان العرض أو الإشعار">
<textarea id="message" rows="4" placeholder="اكتبي التفاصيل"></textarea>

<button onclick="addPost()">نشر</button>

<h2>المنشورات الحالية</h2>
<div id="posts"></div>
</div>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function addPost(){
  const { error } = await client.from("posts").insert([{
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    message: document.getElementById("message").value
  }]);

  if(error){
    alert(error.message);
    return;
  }

  alert("تم النشر ✅");
  document.getElementById("title").value = "";
  document.getElementById("message").value = "";
  loadPosts();
}

async function loadPosts(){
  const { data, error } = await client
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    document.getElementById("posts").innerHTML = error.message;
    return;
  }

  document.getElementById("posts").innerHTML = data.map(p=>`
    <div class="card">
      <b>${p.type === "offer" ? "🔥 عرض" : "🔔 إشعار"}</b>
      <h3>${p.title}</h3>
      <p>${p.message}</p>
      <small>${new Date(p.created_at).toLocaleString("ar-EG")}</small>
    </div>
  `).join("");
}

loadPosts();
</script>

</body>
</html>
