<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>حسابي</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><section class="section container"><div class="glass card"><h2>حسابي في DevPlay</h2><div id="userInfo" class="muted">جاري التحميل...</div><button class="btn red" onclick="logout()">تسجيل خروج</button></div><div class="grid" style="margin-top:16px"><div class="glass card"><h3 id="ordersCount">0</h3><p class="muted">عدد الطلبات</p></div><div class="glass card"><h3 id="spent">0 جنيه</h3><p class="muted">إجمالي الشحن</p></div><div class="glass card"><h3 id="lastStatus">-</h3><p class="muted">آخر حالة</p></div></div><div class="layout-2" style="margin-top:18px"><div class="glass card"><h2>سجل الشحن</h2><div id="orders"></div></div><aside class="glass card"><h2>إشعاراتي 🔔</h2><div id="notifications"></div><h2>بيانات محفوظة 🆔</h2><div id="savedIds"></div></aside></div></section><div id="foot"></div><div id="toast" class="toast"></div><script>top.innerHTML=header("account");foot.innerHTML=footer();</script><script>async function logout(){await client.auth.signOut();location.href="login.html"}async function load(){const user=await currentUser();if(!user){userInfo.innerHTML='أنت غير مسجل. <a href="login.html">تسجيل الدخول</a>';return}userInfo.innerHTML=`مرحبًا <b>${user.user_metadata.name||user.email}</b><br>${user.email}`;const {data:ordersData}=await client.from("orders").select("*").eq("user_id",user.id).order("created_at",{ascending:false});const arr=ordersData||[];ordersCount.textContent=new Set(arr.map(o=>o.order_code)).size;spent.textContent=arr.reduce((s,o)=>s+Number(o.price||0),0)+" جنيه";lastStatus.textContent=arr[0]?statusText(arr[0].status):"-";orders.innerHTML=arr.length?arr.map(o=>`<div class="card glass"><b>${o.order_code}</b> <span class="status ${statusClass(o.status)}">${statusText(o.status)}</span><p>${o.game} - ${o.package}</p><p class="muted">${o.player_id}</p><a class="btn dark" href="games.html">شحن مرة أخرى</a></div>`).join(""):"<p class='muted'>لا يوجد طلبات.</p>";const {data:noti}=await client.from("notifications").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(10);notifications.innerHTML=(noti||[]).map(n=>`<div class="card glass"><b>${n.title}</b><p class="muted">${n.message}</p></div>`).join("")||"<p class='muted'>لا توجد إشعارات.</p>";const {data:ids}=await client.from("saved_ids").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(10);savedIds.innerHTML=(ids||[]).map(x=>`<div class="item-row"><b>${x.game}</b><span class="muted">${x.value}</span></div>`).join("")||"<p class='muted'>لا توجد بيانات محفوظة.</p>"}load();</script></body></html>
