<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تقييم الخدمة</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><section class="section container"><div class="glass card" style="max-width:640px;margin:auto"><h2>تقييم الخدمة ⭐</h2><input id="name" placeholder="اسمك"><select id="rating"><option value="5">5 نجوم</option><option value="4">4 نجوم</option><option value="3">3 نجوم</option></select><textarea id="comment" rows="4" placeholder="رأيك في الخدمة"></textarea><button class="btn" onclick="sendReview()">إرسال التقييم</button></div></section><div id="foot"></div><div id="toast" class="toast"></div><script>top.innerHTML=header("offers");foot.innerHTML=footer();</script><script>async function sendReview(){const {error}=await client.from("reviews").insert([{customer_name:name.value,rating:Number(rating.value),comment:comment.value}]);if(error)return alert(error.message);toast("شكرًا على تقييمك");setTimeout(()=>location.href='offers.html',900)}</script></body></html>
