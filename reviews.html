<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="top"></div>
  
<section class="section container">
  <div class="glass card" style="max-width:480px;margin:auto">
    <h2>إنشاء حساب</h2>
    <div class="form"><input id="name" placeholder="الاسم"><input id="email" type="email" placeholder="البريد الإلكتروني"><input id="password" type="password" placeholder="كلمة المرور"><button class="btn" onclick="register()">إنشاء حساب</button><p class="muted">عندك حساب؟ <a href="login.html">دخول</a></p></div>
  </div>
</section>

  <div id="foot"></div>
  <div id="toast" class="toast"></div>
  <script>
    document.getElementById("top").innerHTML = header("account");
    document.getElementById("foot").innerHTML = footer();
  </script>
  
<script>
async function register(){const {error}=await client.auth.signUp({email:email.value,password:password.value,options:{data:{name:name.value},emailRedirectTo:location.origin+location.pathname.replace("register.html","account.html")}});if(error)return alert(error.message);alert("افتح رابط التأكيد من الإيميل");}
</script>

</body>
</html>
