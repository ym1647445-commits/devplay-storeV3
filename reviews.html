<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقييم الخدمة - DevPlay</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>

<div id="top"></div>

<section class="section container">

  <div class="glass card" style="max-width:650px;margin:auto">

    <h2>تقييم الخدمة ⭐</h2>

    <p class="muted">
      رأيك يهمنا ويساعدنا نطور DevPlay
    </p>

    <div class="form">

      <label>اسمك</label>
      <input id="customerName" placeholder="اكتب اسمك">

      <label>التقييم</label>
      <select id="rating">
        <option value="5">⭐⭐⭐⭐⭐ ممتاز</option>
        <option value="4">⭐⭐⭐⭐ جيد جدًا</option>
        <option value="3">⭐⭐⭐ جيد</option>
        <option value="2">⭐⭐ مقبول</option>
        <option value="1">⭐ سيء</option>
      </select>

      <label>رأيك</label>
      <textarea id="comment" rows="4" placeholder="اكتب رأيك في الخدمة"></textarea>

      <button class="btn" onclick="sendReview()">
        إرسال التقييم
      </button>

    </div>

  </div>

</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("offers");
document.getElementById("foot").innerHTML = footer();

async function sendReview() {

  const name = customerName.value.trim();
  const text = comment.value.trim();

  if (!name) {
    return toast("اكتب اسمك");
  }

  if (!text) {
    return toast("اكتب رأيك");
  }

  const { error } = await client
    .from("reviews")
    .insert([{
      customer_name: name,
      rating: Number(rating.value),
      comment: text
    }]);

  if (error) {
    alert(error.message);
    return;
  }

  toast("تم إرسال التقييم ✅");

  setTimeout(() => {
    location.href = "offers.html";
  }, 1000);
}
</script>

</body>
</html>
