<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>استعادة كلمة المرور - DevPlay</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>

<div id="top"></div>

<section class="section container">

  <div class="glass card" style="max-width:520px;margin:auto">

    <h2>استعادة كلمة المرور 🔐</h2>

    <p class="muted">
      اكتبي بريدك وهيتم إرسال رابط تغيير كلمة المرور.
    </p>

    <div class="form">

      <label>البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="example@gmail.com">

      <button class="btn" onclick="sendReset()">
        إرسال رابط التغيير
      </button>

      <a class="btn dark" href="login.html">
        الرجوع لتسجيل الدخول
      </a>

    </div>

  </div>

</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("account");
document.getElementById("foot").innerHTML = footer();

async function sendReset() {
  const mail = email.value.trim();

  if (!mail) {
    return toast("اكتبي البريد الإلكتروني");
  }

  const { error } = await client.auth.resetPasswordForEmail(mail, {
    redirectTo: location.origin + "/reset-password.html"
  });

  if (error) {
    alert(error.message);
    return;
  }

  toast("تم إرسال رابط تغيير كلمة المرور على البريد ✅");
}
</script>

</body>
</html>
