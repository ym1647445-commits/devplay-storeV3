<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DevPlay Store</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><main class="container hero"><section class="hero-card glass"><div><span class="badge">Gaming Store</span><h1>DevPlay Store ⚡</h1><p>شحن ألعاب واشتراكات رقمية، حساب حقيقي، سجل شراء، عروض، وتتبع الطلبات من مكان واحد.</p><a class="btn" href="games.html">ابدأ الشحن</a> <a class="btn dark" href="offers.html">شوف العروض</a></div><div class="hero-img"><img src="logo.png"></div></section></main><section class="section container"><div class="section-head"><h2>الأكثر شحنًا 🔥</h2><a class="btn dark" href="games.html">عرض الكل</a></div><div class="grid" id="popular"></div></section><section class="section container"><div class="section-head"><h2>العروض والإشعارات</h2><a class="btn dark" href="offers.html">كل العروض</a></div><div class="grid" id="homePosts"></div></section><div id="foot"></div><div id="toast" class="toast"></div><script>top.innerHTML=header("home");foot.innerHTML=footer();</script><script>popular.innerHTML=PRODUCTS.filter(p=>p.popular).slice(0,8).map(p=>productCard(p,PRODUCTS.indexOf(p))).join("");(async()=>{const {data}=await client.from("posts").select("*").order("created_at",{ascending:false}).limit(3);homePosts.innerHTML=(data||[]).map(p=>`<div class="card glass"><span class="badge">${p.type==="offer"?"🔥 عرض":"🔔 إشعار"}</span><h3>${p.title}</h3><p class="muted">${p.message}</p></div>`).join("")||"<p class='muted'>لا توجد عروض.</p>"})();</script></body></html>
