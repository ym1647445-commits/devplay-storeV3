<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة - DevPlay</title>

<style>
body{
margin:0;
font-family:Tahoma,Arial;
background:#f5f6fb;
color:#111827;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px #0001;
}

.logo{
font-size:25px;
font-weight:bold;
color:#5b35f5;
}

.container{
max-width:1000px;
margin:30px auto;
padding:0 20px;
}

.cartItem{
background:white;
border-radius:24px;
padding:20px;
margin-bottom:18px;
box-shadow:0 10px 30px #0001;
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
}

.info h2{
margin:0 0 10px;
color:#5b35f5;
}

.price{
font-size:24px;
font-weight:bold;
color:#ff7a18;
}

.remove{
background:#dc2626;
color:white;
border:none;
padding:10px 15px;
border-radius:12px;
cursor:pointer;
}

.summary{
background:white;
border-radius:24px;
padding:25px;
box-shadow:0 10px 30px #0001;
margin-top:25px;
}

.total{
font-size:30px;
font-weight:bold;
margin:15px 0;
color:#5b35f5;
}

.checkout{
display:block;
width:100%;
text-align:center;
background:#5b35f5;
color:white;
padding:15px;
border-radius:15px;
font-size:18px;
font-weight:bold;
text-decoration:none;
}

.empty{
background:white;
padding:40px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px #0001;
}

.small{
color:#6b7280;
line-height:1.8;
}
</style>
</head>

<body>

<header>
<div class="logo">🛒 DevPlay Cart</div>

<a href="games.html">
العودة للألعاب
</a>
</header>

<div class="container">

<div id="cartContainer"></div>

<div class="summary">

<h2>ملخص الطلب</h2>

<div class="total">
الإجمالي:
<span id="totalPrice">0</span>
جنيه
</div>

<a class="checkout" href="checkout.html">
إتمام الطلب
</a>

</div>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

const container =
document.getElementById("cartContainer");

if(cart.length === 0){

container.innerHTML = `
<div class="empty">

<h2>
السلة فارغة 😢
</h2>

<p>
أضف منتجات أولًا
</p>

</div>
`;

document.getElementById("totalPrice").innerText = 0;

return;

}

container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += Number(item.price);

container.innerHTML += `

<div class="cartItem">

<div class="info">

<h2>
${item.game}
</h2>

<p>
${item.name}
</p>

<p class="small">
البيانات:
${item.playerId}
</p>

<div class="price">
${item.price} جنيه
</div>

</div>

<div>

<button class="remove"
onclick="removeItem(${index})">

حذف

</button>

</div>

</div>

`;

});

document.getElementById("totalPrice").innerText =
total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

renderCart();

</script>

</body>
</html>
