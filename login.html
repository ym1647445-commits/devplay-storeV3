<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - DevPlay</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>

<div id="top"></div>

<section class="section container">
  <div class="glass card" style="max-width:480px;margin:auto">

    <h2>تسجيل الدخول</h2>

    <div class="form">

      <input id="email" type="email" placeholder="البريد الإلكتروني">

      <input id="password" type="password" placeholder="كلمة المرور">

      <button class="btn" onclick="login()">
        دخول
      </button>

      <button class="btn dark" onclick="signInWithGoogle()" type="button">
        الدخول باستخدام Google
      </button>

      <div style="margin-top:10px;text-align:center">
        <a href="forgot-password.html" class="muted">
          نسيت كلمة المرور؟
        </a>
      </div>

      <p class="muted" style="text-align:center">
        ليس لديك حساب؟
        <a href="register.html">إنشاء حساب</a>
      </p>

    </div>

  </div>
</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
  document.getElementById("top").innerHTML = header("account");
  document.getElementById("foot").innerHTML = footer();
</script>

<script>
async function login() {
  const mail = email.value.trim().toLowerCase();

  if (!mail || !password.value) {
    return toast("اكتبي البريد وكلمة المرور");
  }

  const ban = await checkBannedEmail(mail);

  if (ban.banned) {
    return alert("هذا البريد محظور.
السبب: " + ban.reason);
  }

  const { data, error } = await client.auth.signInWithPassword({
    email: mail,
    password: password.value
  });

  if (error) {
    alert(error.message);
    return;
  }

  await logLoginEvent(data.user, "password");

  location.href = "account.html";
}
</script>

</body>
</html>
