<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="top"></div>

  
<section class="section container">
  <div class="layout-2">
    <div class="glass card">
      <h2>إتمام الطلب ⚡</h2>

      <div class="form">
        <label>الاسم</label>
        <input id="customerName" placeholder="اكتب اسمك">

        <label>رقم واتساب</label>
        <input id="phone" placeholder="010xxxxxxxx">

        <label>رقم عملية التحويل</label>
        <input id="paymentCode" placeholder="رقم العملية أو آخر 4 أرقام">

        <label>ملاحظات</label>
        <textarea id="notes" rows="3" placeholder="أي ملاحظات إضافية"></textarea>

        <button class="btn" onclick="submitOrder()">تأكيد الطلب</button>

        <p class="muted">
          الدفع على Vodafone Cash:
          <b class="num">010 359 66569</b>
        </p>

        <p class="muted">
          تنبيه: مدة الشحن قد تختلف حسب التواجد، وقد تتأخر أحيانًا 3-4 ساعات أو 8-9 ساعات أثناء النوم أو عدم التواجد.
        </p>
      </div>
    </div>

    <aside class="glass card">
      <h2>ملخص الطلب</h2>
      <div id="summary"></div>
      <div class="total" id="finalTotal">0 جنيه</div>
    </aside>
  </div>
</section>


  <div id="foot"></div>
  <div id="toast" class="toast"></div>

  <script>
    document.getElementById("top").innerHTML = header("games");
    document.getElementById("foot").innerHTML = footer();
  </script>

  
<script>
function renderSummary() {
  const c = cart();
  let total = 0;

  document.getElementById("summary").innerHTML =
    c.length
      ? c.map(item => {
          total += Number(item.price);
          return `
            <div class="item-row">
              <div>
                <b>${item.game}</b>
                <p class="muted">${item.name}<br>${item.playerId}</p>
              </div>
              <b>${item.price} جنيه</b>
            </div>
          `;
        }).join("")
      : "<p class='muted'>السلة فارغة.</p>";

  document.getElementById("finalTotal").textContent = total + " جنيه";
}

async function submitOrder() {
  const c = cart();

  if (!c.length) return toast("السلة فارغة");
  if (!customerName.value || !phone.value) return toast("اكتبي الاسم والرقم");

  const user = await currentUser();
  const code = orderCode();

  const rows = c.map(item => ({
    user_id: user ? user.id : null,
    product_id: item.product_id || null,
    category: item.category || null,
    customer_name: customerName.value,
    phone: phone.value,
    customer_phone: phone.value,
    game: item.game,
    package: item.name,
    player_id: item.playerId,
    price: Number(item.price),
    status: "pending",
    order_code: code,
    payment_code: paymentCode.value,
    notes: notes.value
  }));

  const { error } = await client.from("orders").insert(rows);

  if (error) return alert(error.message);

  if (user) {
    await client.from("notifications").insert([{
      user_id: user.id,
      title: "تم استلام طلبك",
      message: `طلبك ${code} قيد المراجعة`,
      type: "order"
    }]);
  }

  localStorage.removeItem("cart");
  toast("تم إرسال الطلب ✅");

  setTimeout(() => {
    location.href = "account.html";
  }, 900);
}

renderSummary();
</script>

</body>
</html>
