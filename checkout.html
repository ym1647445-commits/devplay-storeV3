<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>
<div id="top"></div>

<section class="section container">
  <div class="layout-2">

    <div class="glass card">
      <h2>إتمام الطلب ⚡</h2>
      <p class="muted">الدفع حاليًا من رصيد الموقع فقط. لو رصيدك غير كافي، اشحني المحفظة أولًا.</p>
      <h3>رصيدك الحالي: <span id="walletBalance">0</span> جنيه</h3>

      <div class="form">
        <label>الاسم</label>
        <input id="customerName" placeholder="اكتب اسمك">

        <label>رقم واتساب</label>
        <input id="phone" placeholder="010xxxxxxxx">

        <label>ملاحظات</label>
        <textarea id="notes" rows="3" placeholder="أي ملاحظات إضافية"></textarea>

        <button class="btn" onclick="submitOrder()">تأكيد الطلب والدفع من الرصيد</button>
        <a class="btn dark" href="wallet.html">إضافة رصيد</a>
      </div>
    </div>

    <aside class="glass card">
      <h2>ملخص الطلب</h2>
      <div id="summary"></div>
      <div class="total" id="finalTotal">0 جنيه</div>
    </aside>

  </div>
</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("games");
document.getElementById("foot").innerHTML = footer();

let loggedUser = null;
let wallet = null;
let orderTotal = 0;

async function loadWalletForCheckout() {

  loggedUser = await currentUser();

  if (!loggedUser) {
    alert("لازم تسجلي دخول قبل إتمام الطلب من الرصيد");
    location.href = "login.html";
    return;
  }

  const { data } = await client
    .from("wallets")
    .select("*")
    .eq("user_id", loggedUser.id)
    .maybeSingle();

  if (!data) {
    await client
      .from("wallets")
      .insert([{ user_id: loggedUser.id, balance: 0 }]);

    wallet = { balance: 0 };
  } else {
    wallet = data;
  }

  walletBalance.textContent = Number(wallet.balance || 0);
}

function renderSummary() {

  const c = cart();

  let total = 0;

  summary.innerHTML =
    c.length
      ? c.map(item => {

        total += Number(item.price);

        return `
          <div class="item-row">
            <div>
              <b>${item.game}</b>
              <p class="muted">
                ${item.name}<br>
                ${item.playerId}
              </p>
            </div>

            <b>${item.price} جنيه</b>
          </div>
        `;

      }).join("")
      : "<p class='muted'>السلة فارغة.</p>";

  orderTotal = total;
  finalTotal.textContent = total + " جنيه";
}

async function submitOrder() {

  const c = cart();

  if (!loggedUser)
    return toast("سجلي دخول الأول");

  if (!c.length)
    return toast("السلة فارغة");

  if (!customerName.value || !phone.value)
    return toast("اكتبي الاسم ورقم الواتساب");

  const balance = Number(wallet.balance || 0);

  if (balance < orderTotal) {
    alert("رصيدك غير كافي. اشحني المحفظة الأول.");
    location.href = "wallet.html";
    return;
  }

  const code = orderCode();

  const rows = c.map(item => ({

    user_id: loggedUser.id,
    product_id: item.product_id || null,
    category: item.category || null,

    customer_name: customerName.value,
    phone: phone.value,
    customer_phone: phone.value,

    game: item.game,
    package: item.name,
    player_id: item.playerId,
    price: Number(item.price),

    status: "pending",
    order_code: code,
    notes: notes.value,

    payment_method: "wallet",
    wallet_paid: true

  }));

  const { error } = await client
    .from("orders")
    .insert(rows);

  if (error)
    return alert(error.message);

  const itemsText = c.map(item =>
`🎮 ${item.game}
📦 ${item.name}
🆔 ${item.playerId}
💰 ${item.price} جنيه`
  ).join("\n\n");

  const msg =
`🛒 طلب جديد مدفوع من الرصيد

🔢 رقم الطلب:
${code}

👤 العميل:
${customerName.value}

📱 واتساب:
${phone.value}

📧 الحساب:
${loggedUser.email}

🎮 الطلبات:
${itemsText}

💰 الإجمالي:
${orderTotal} جنيه

💳 طريقة الدفع:
رصيد الموقع

📝 ملاحظات:
${notes.value || "لا يوجد"}`;

  try {

  const tg = await fetch(
    "https://bwtchfidnvlwyikhawua.supabase.co/functions/v1/send-telegram",
    {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        type: "order",
        message: msg
      })

    }
  );

  const tgData = await tg.json();

  console.log("Telegram response:", tgData);

  if (!tgData.ok) {

    alert(
      "Telegram Error: " +
      JSON.stringify(tgData)
    );

  }

} catch (err) {

  alert(
    "Telegram Fetch Error: " +
    err.message
  );

}
    );
  } catch (err) {
    console.log("Telegram Error:", err);
  }

  const newBalance = balance - orderTotal;

  const { error: walletError } = await client
    .from("wallets")
    .update({
      balance: newBalance,
      updated_at: new Date().toISOString()
    })
    .eq("user_id", loggedUser.id);

  if (walletError)
    return alert(walletError.message);

  await client
    .from("wallet_transactions")
    .insert([{
      user_id: loggedUser.id,
      type: "debit",
      amount: orderTotal,
      note: `دفع طلب ${code}`,
      ref_id: code
    }]);

  await client
    .from("notifications")
    .insert([{
      user_id: loggedUser.id,
      title: "تم استلام طلبك",
      message: `تم خصم ${orderTotal} جنيه من رصيدك. طلبك ${code} قيد المراجعة.`,
      type: "order"
    }]);

  localStorage.removeItem("cart");
await fetch(
"https://bwtchfidnvlwyikhawua.supabase.co/functions/v1/send-email",
{

  method:"POST",

  headers:{
    "Content-Type":"application/json"
  },

  body:JSON.stringify({

    to: loggedUser.email,

    subject:
      `تم استلام طلبك ${code} | DevPlay`,

    html: `

    <div style="
      font-family:sans-serif;
      background:#0f172a;
      padding:30px;
      color:white;
      border-radius:20px;
    ">

      <h1 style="
        color:#38bdf8;
      ">
        🎮 DevPlay
      </h1>

      <h2>
        تم استلام طلبك بنجاح ✅
      </h2>

      <p>
        رقم الطلب:
        <b>${code}</b>
      </p>

      <p>
        الإجمالي:
        <b>${orderTotal} جنيه</b>
      </p>

      <p>
        حالة الطلب:
        <b style="color:#facc15">
          قيد المراجعة
        </b>
      </p>

      <hr>

      <p>
        شكرًا لاستخدامك DevPlay 💜
      </p>

    </div>

    `

  })

});
  toast("تم إرسال الطلب والدفع من الرصيد ✅");

  setTimeout(() => {
    location.href = "account.html";
  }, 1200);
}

renderSummary();
loadWalletForCheckout();
</script>

</body>
</html>
