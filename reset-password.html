<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>تغيير كلمة المرور - DevPlay</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>

<div id="top"></div>

<section class="section container">

  <div class="glass card" style="max-width:520px;margin:auto">

    <h2>تغيير كلمة المرور 🔐</h2>

    <p class="muted">
      اكتبي كلمة المرور الجديدة.
    </p>

    <div class="form">

      <label>كلمة المرور الجديدة</label>
      <input id="password" type="password" placeholder="كلمة مرور قوية">

      <label>تأكيد كلمة المرور</label>
      <input id="confirmPassword" type="password" placeholder="أعيدي كتابة كلمة المرور">

      <button class="btn" onclick="changePassword()">
        حفظ كلمة المرور
      </button>

    </div>

  </div>

</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("account");
document.getElementById("foot").innerHTML = footer();

async function changePassword() {
  const pass = password.value;
  const confirm = confirmPassword.value;

  if (!pass || pass.length < 8) {
    return toast("كلمة المرور لازم تكون 8 حروف أو أكتر");
  }

  if (pass !== confirm) {
    return toast("كلمتا المرور غير متطابقتين");
  }

  const { error } = await client.auth.updateUser({
    password: pass
  });

  if (error) {
    alert(error.message);
    return;
  }

  toast("تم تغيير كلمة المرور بنجاح ✅");

  setTimeout(() => {
    location.href = "login.html";
  }, 1200);
}
</script>

</body>
</html>
