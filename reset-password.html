<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تغيير كلمة المرور - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
<div id="top"></div>

<section class="section container">
  <div class="glass card" style="max-width:520px;margin:auto">
    <h2>تغيير كلمة المرور 🔐</h2>
    <p class="muted">اكتبي كلمة مرور جديدة بعد فتح رابط البريد.</p>

    <div class="form">
      <input id="newPassword" type="password" placeholder="كلمة المرور الجديدة">
      <input id="confirmPassword" type="password" placeholder="تأكيد كلمة المرور">
      <button class="btn" onclick="updatePassword()">تغيير كلمة المرور</button>
      <a class="btn dark" href="login.html">تسجيل الدخول</a>
    </div>
  </div>
</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("account");
document.getElementById("foot").innerHTML = footer();

async function updatePassword() {
  const pass = newPassword.value.trim();
  const confirm = confirmPassword.value.trim();

  if (pass.length < 6) return toast("كلمة المرور لازم تكون 6 حروف أو أكثر");
  if (pass !== confirm) return toast("كلمة المرور غير متطابقة");

  const { data: sessionData } = await client.auth.getSession();

  if (!sessionData.session) {
    return alert("افتحي رابط تغيير كلمة المرور من البريد مرة أخرى.");
  }

  const { error } = await client.auth.updateUser({ password: pass });

  if (error) return alert(error.message);

  await client.auth.signOut();
  alert("تم تغيير كلمة المرور بنجاح ✅");
  location.href = "login.html";
}
</script>
</body>
</html>
