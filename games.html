<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المتجر - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="top"></div>
  
<section class="section container">
  <div class="section-head"><h2>شحن الألعاب والخدمات 🎮</h2><a class="btn" href="cart.html">السلة <b data-cart-count>0</b></a></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="products"></div>
</section>
<div class="modal" id="modal">
  <div class="modal-box glass">
    <button class="close" onclick="closeModal()">×</button>
    <div id="modalInfo"></div>
    <input id="playerInput">
    <button class="btn" onclick="confirmAdd()">إضافة للسلة</button>
  </div>
</div>

  <div id="foot"></div>
  <div id="toast" class="toast"></div>
  <script>
    document.getElementById("top").innerHTML = header("games");
    document.getElementById("foot").innerHTML = footer();
  </script>
  
<script>
const games=["all","popular",...new Set(PRODUCTS.map(p=>p.game))];
const names={all:"الكل",popular:"الأشهر 🔥"};
document.getElementById("filters").innerHTML=games.map((g,i)=>`<button class="filter ${i===0?'active':''}" onclick="filterProducts('${g}',this)">${names[g]||g}</button>`).join("");
function renderProducts(list){document.getElementById("products").innerHTML=list.map(p=>productCard(p,PRODUCTS.indexOf(p))).join("")}
function filterProducts(g,btn){document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(g==="all")renderProducts(PRODUCTS);else if(g==="popular")renderProducts(PRODUCTS.filter(p=>p.popular));else renderProducts(PRODUCTS.filter(p=>p.game===g))}
renderProducts(PRODUCTS);
</script>

</body>
</html>
