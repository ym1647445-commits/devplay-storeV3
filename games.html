<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الألعاب - DevPlay</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><section class="section container"><div class="section-kicker">المتجر</div><h1 class="section-title">ابحث عن <span>خدمتك</span></h1><div class="store-toolbar"><input id="searchBox" placeholder="ابحث عن لعبة أو خدمة..." oninput="applyFilters()"><div class="filters" id="categoryFilters"></div><div class="filters" id="gameFilters"></div></div><p class="muted" id="resultCount"></p><div class="grid" id="products"></div></section><div class="modal" id="modal"><div class="modal-box glass"><button class="close" onclick="closeModal()">×</button><div id="modalInfo"></div><input id="playerInput"><button class="btn" onclick="confirmAdd()">إضافة للسلة</button></div></div><div id="foot"></div><div id="toast" class="toast"></div><script>document.getElementById("top").innerHTML=header("games");document.getElementById("foot").innerHTML=footer();let currentCategory="all";let currentGame="all";function getUrlCat(){const params=new URLSearchParams(location.search);return params.get("cat")||"all"}function renderCategoryFilters(){const cats=["all",...new Set(PRODUCTS.map(p=>p.category||"other"))];const names={all:"كل الأقسام",games:"🎮 ألعاب",mobile:"📱 رصيد",fakka:"⚡ كروت فكة",cards:"💳 بطاقات",other:"أخرى"};categoryFilters.innerHTML=cats.map(cat=>`<button class="filter ${cat===currentCategory?"active":""}" onclick="setCategory('${cat}')">${names[cat]||cat}</button>`).join("")}function renderGameFilters(){const filtered=currentCategory==="all"?PRODUCTS:PRODUCTS.filter(p=>p.category===currentCategory);const games=["all",...new Set(filtered.map(p=>p.game))];gameFilters.innerHTML=games.map(g=>`<button class="filter ${g===currentGame?"active":""}" onclick="setGame('${g}')">${g==="all"?"كل المنتجات":g}</button>`).join("")}function setCategory(cat){currentCategory=cat;currentGame="all";renderCategoryFilters();renderGameFilters();applyFilters()}function setGame(game){currentGame=game;renderGameFilters();applyFilters()}function applyFilters(){const q=searchBox.value.toLowerCase().trim();const list=PRODUCTS.filter(p=>{const text=`${p.game} ${p.name} ${p.category}`.toLowerCase();return(currentCategory==="all"||p.category===currentCategory)&&(currentGame==="all"||p.game===currentGame)&&text.includes(q)});resultCount.textContent=`عرض ${list.length} من ${PRODUCTS.length} منتج`;products.innerHTML=list.length?list.map(p=>productCard(p,PRODUCTS.indexOf(p))).join(""):"<div class='glass card'>لا توجد منتجات مطابقة.</div>"}async function initStore(){renderSkeleton("products",8);await loadProductsFromDB();currentCategory=getUrlCat();renderCategoryFilters();renderGameFilters();applyFilters()}initStore();</script></body></html>
