<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الألعاب - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>

<div id="top"></div>

<section class="section container">
  <div class="section-kicker">المتجر</div>
  <h1 class="section-title">ابحث عن <span>خدمتك</span></h1>

  <div class="store-toolbar">
    <input id="searchBox" placeholder="ابحث عن لعبة أو خدمة..." oninput="applyFilters()">
    <div class="filters" id="categoryFilters"></div>
    <div class="filters" id="gameFilters"></div>
  </div>

  <p class="muted" id="resultCount"></p>
  <div class="grid" id="products"></div>
</section>

<div class="modal" id="modal">
  <div class="modal-box glass">
    <button class="close" onclick="closeModal()">×</button>
    <div id="modalInfo"></div>
    <input id="playerInput">
    <button class="btn" onclick="confirmAdd()">إضافة للسلة</button>
  </div>
</div>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("games");
document.getElementById("foot").innerHTML = footer();

let currentCategory = "all";
let currentGame = "all";

const MOBILE_NETWORKS = {
  Vodafone: { title: "فودافون", img: "vod.png" },
  Orange: { title: "أورنج", img: "orange.png" },
  Etisalat: { title: "اتصالات", img: "e.png" }
};

const MOBILE_VALUES = [10, 25, 50, 75, 100, 150, 199.99, 249.99, 299.99, 349.99];

let selectedMobileNetwork = "Vodafone";
let selectedCreditValue = 0;

function getUrlCat() {
  const params = new URLSearchParams(location.search);
  return params.get("cat") || "all";
}

function money(value) {
  return Number(value || 0).toFixed(2).replace(/\.00$/, "");
}

function calcPaymentFromCredit(credit) {
  return Number(credit) * 1.429 + 7;
}

function renderCategoryFilters() {
  const cats = ["all", ...new Set(PRODUCTS.map(p => p.category || "other"))];

  const names = {
    all: "كل الأقسام",
    games: "🎮 ألعاب",
    mobile: "📱 رصيد",
    fakka: "⚡ كروت فكة",
    cards: "💳 بطاقات",
    other: "أخرى"
  };

  categoryFilters.innerHTML = cats.map(cat => `
    <button class="filter ${cat === currentCategory ? "active" : ""}" onclick="setCategory('${cat}')">
      ${names[cat] || cat}
    </button>
  `).join("");
}

function renderGameFilters() {
  const filtered = currentCategory === "all" ? PRODUCTS : PRODUCTS.filter(p => p.category === currentCategory);

  const games = [
    "all",
    ...new Set(filtered.filter(p => p.category !== "mobile").map(p => p.game))
  ];

  gameFilters.innerHTML = games.map(g => `
    <button class="filter ${g === currentGame ? "active" : ""}" onclick="setGame('${g}')">
      ${g === "all" ? "كل المنتجات" : g}
    </button>
  `).join("");
}

function setCategory(cat) {
  currentCategory = cat;
  currentGame = "all";
  renderCategoryFilters();
  renderGameFilters();
  applyFilters();
}

function setGame(game) {
  currentGame = game;
  renderGameFilters();
  applyFilters();
}

function mobileBalanceCard() {
  const net = MOBILE_NETWORKS[selectedMobileNetwork];
  const pay = selectedCreditValue ? calcPaymentFromCredit(selectedCreditValue) : 0;

  return `
    <div class="glass card" style="grid-column:1/-1;padding:24px;border-radius:30px">

      <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px">
        <div>
          <div class="section-kicker">رصيد موبايل</div>
          <h2 style="margin:8px 0 4px">اختاري الشبكة وقيمة الرصيد</h2>
          <p class="muted" style="margin:0">الدفع = قيمة الرصيد × 1.429 + 7 جنيه</p>
        </div>

        <div style="width:76px;height:76px;border-radius:24px;background:rgba(255,255,255,.12);display:grid;place-items:center;overflow:hidden">
          <img src="${net.img}" style="max-width:64px;max-height:64px" onerror="this.style.display='none'">
        </div>
      </div>

      <div class="filters" style="margin-bottom:16px">
        ${Object.keys(MOBILE_NETWORKS).map(key => `
          <button class="filter mobile-network-btn ${selectedMobileNetwork === key ? "active" : ""}" onclick="selectMobileNetwork('${key}')">
            ${MOBILE_NETWORKS[key].title}
          </button>
        `).join("")}
      </div>

      <label style="font-weight:900;margin-bottom:10px;display:block">رقم الموبايل المراد شحنه</label>
      <input id="mobilePhoneInput" placeholder="010xxxxxxxx" style="margin-bottom:18px">

      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px">
        ${MOBILE_VALUES.map(value => `
          <button
            type="button"
            class="glass card mobile-value-btn"
            onclick="selectMobileValue(${value})"
            style="
              border:${selectedCreditValue === value ? "2px solid var(--s)" : "1px solid var(--line)"};
              cursor:pointer;
              text-align:center;
              padding:18px 10px;
              box-shadow:none;
            "
          >
            <div style="font-size:26px;font-weight:950">${money(value)}</div>
            <div class="muted" style="font-size:14px">يدفع ${money(calcPaymentFromCredit(value))} ج.م</div>
          </button>
        `).join("")}
      </div>

      <div class="glass card" style="margin-top:18px;padding:18px;box-shadow:none">
        <div style="display:flex;justify-content:space-between;gap:12px">
          <span>الشبكة</span>
          <b>${net.title}</b>
        </div>

        <div style="display:flex;justify-content:space-between;gap:12px;margin-top:10px">
          <span>قيمة الرصيد</span>
          <b>${selectedCreditValue ? money(selectedCreditValue) : "0"} رصيد</b>
        </div>

        <div style="display:flex;justify-content:space-between;gap:12px;margin-top:10px">
          <span>المبلغ المطلوب دفعه</span>
          <b style="color:var(--s);font-size:22px">${money(pay)} جنيه</b>
        </div>
      </div>

      <button class="btn" style="width:100%;margin-top:16px;height:56px;font-size:18px" onclick="addMobileBalanceToCart()">
        إضافة الرصيد للسلة
      </button>

    </div>
  `;
}

function selectMobileNetwork(network) {
  selectedMobileNetwork = network;
  applyFilters();
}

function selectMobileValue(value) {
  selectedCreditValue = Number(value);
  applyFilters();
}

function addMobileBalanceToCart() {
  const phoneInput = document.getElementById("mobilePhoneInput");
  const phone = phoneInput ? phoneInput.value.trim() : "";

  if (!selectedCreditValue) return toast("اختاري قيمة الرصيد");
  if (!phone) return toast("اكتبي رقم الموبايل المراد شحنه");
  if (!/^01[0-9]{9}$/.test(phone)) return toast("رقم الموبايل غير صحيح");

  const net = MOBILE_NETWORKS[selectedMobileNetwork];
  const pay = calcPaymentFromCredit(selectedCreditValue);

  const c = cart();

  c.push({
    product_id: null,
    category: "mobile",
    game: "رصيد موبايل",
    name: `${net.title} - رصيد ${money(selectedCreditValue)}`,
    price: Number(pay.toFixed(2)),
    playerId: phone,
    need: "رقم الموبايل",
    balanceValue: selectedCreditValue
  });

  setCart(c);
  toast(`تم إضافة رصيد ${money(selectedCreditValue)} للسلة ✅`);
}

function applyFilters() {
  const q = searchBox.value.toLowerCase().trim();

  const list = PRODUCTS.filter(p => {
    const text = `${p.game} ${p.name} ${p.category}`.toLowerCase();

    return (
      (currentCategory === "all" || p.category === currentCategory)
      &&
      (currentGame === "all" || p.game === currentGame)
      &&
      text.includes(q)
      &&
      p.category !== "mobile"
    );
  });

  const shouldShowMobile =
    currentCategory === "all" ||
    currentCategory === "mobile" ||
    q.includes("رصيد") ||
    q.includes("فودافون") ||
    q.includes("اورنج") ||
    q.includes("أورنج") ||
    q.includes("اتصالات");

  const mobileHTML = shouldShowMobile ? mobileBalanceCard() : "";

  resultCount.textContent = `عرض ${list.length + (shouldShowMobile ? 1 : 0)} منتج`;

  products.innerHTML =
    mobileHTML +
    (
      list.length
        ? list.map(p => productCard(p, PRODUCTS.indexOf(p))).join("")
        : (!shouldShowMobile ? "<div class='glass card'>لا توجد منتجات مطابقة.</div>" : "")
    );
}

async function initStore() {
  renderSkeleton("products", 8);
  await loadProductsFromDB();
  currentCategory = getUrlCat();
  renderCategoryFilters();
  renderGameFilters();
  applyFilters();
}

initStore();
</script>

</body>
</html>
