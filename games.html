<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    الألعاب - DevPlay
  </title>

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="config.js"></script>

  <script src="app.js"></script>

</head>

<body>

  <div id="top"></div>

  <section class="section container">

    <div class="section-kicker">
      المتجر
    </div>

    <h1 class="section-title">
      ابحث عن <span>خدمتك</span>
    </h1>

    <div class="store-toolbar">

      <input
        id="searchBox"
        placeholder="ابحث عن لعبة أو خدمة..."
        oninput="applyFilters()"
      >

      <div
        class="filters"
        id="categoryFilters"
      ></div>

      <div
        class="filters"
        id="gameFilters"
      ></div>

    </div>

    <p
      class="muted"
      id="resultCount"
    ></p>

    <div
      class="grid"
      id="products"
    ></div>

  </section>

  <div
    class="modal"
    id="modal"
  >

    <div class="modal-box glass">

      <button
        class="close"
        onclick="closeModal()"
      >
        ×
      </button>

      <div id="modalInfo"></div>

      <input id="playerInput">

      <button
        class="btn"
        onclick="confirmAdd()"
      >
        إضافة للسلة
      </button>

    </div>

  </div>

  <div id="foot"></div>

  <div
    id="toast"
    class="toast"
  ></div>

<script>

document.getElementById("top").innerHTML =
  header("games");

document.getElementById("foot").innerHTML =
  footer();

let currentCategory = "all";
let currentGame = "all";

function getUrlCat() {

  const params =
    new URLSearchParams(location.search);

  return params.get("cat") || "all";
}

function renderCategoryFilters() {

  const cats = [
    "all",
    ...new Set(
      PRODUCTS.map(
        p => p.category || "other"
      )
    )
  ];

  const names = {

    all:
      "كل الأقسام",

    games:
      "🎮 ألعاب",

    mobile:
      "📱 رصيد",

    fakka:
      "⚡ كروت فكة",

    cards:
      "💳 بطاقات",

    other:
      "أخرى"
  };

  categoryFilters.innerHTML =
    cats.map(cat => `

      <button
        class="filter ${cat === currentCategory ? "active" : ""}"
        onclick="setCategory('${cat}')"
      >

        ${names[cat] || cat}

      </button>

    `).join("");
}

function renderGameFilters() {

  const filtered =

    currentCategory === "all"

    ?

    PRODUCTS

    :

    PRODUCTS.filter(
      p => p.category === currentCategory
    );

  const games = [

    "all",

    ...new Set(
      filtered.map(p => p.game)
    )
  ];

  gameFilters.innerHTML =
    games.map(g => `

      <button
        class="filter ${g === currentGame ? "active" : ""}"
        onclick="setGame('${g}')"
      >

        ${g === "all"
          ? "كل المنتجات"
          : g}

      </button>

    `).join("");
}

function setCategory(cat) {

  currentCategory = cat;

  currentGame = "all";

  renderCategoryFilters();

  renderGameFilters();

  applyFilters();
}

function setGame(game) {

  currentGame = game;

  renderGameFilters();

  applyFilters();
}

function mobileBalanceCard() {

  return `

    <div class="glass card balance-card">

      <div
        style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-bottom:14px;
        "
      >

        <div>

          <div class="section-kicker">
            رصيد موبايل
          </div>

          <h3>
            شحن رصيد مباشر
          </h3>

        </div>

        <div
          style="
            font-size:34px;
          "
        >
          📱
        </div>

      </div>

      <div class="filters">

        <button
          class="filter active network-btn"
          data-net="Vodafone"
        >
          فودافون
        </button>

        <button
          class="filter network-btn"
          data-net="Orange"
        >
          أورنج
        </button>

        <button
          class="filter network-btn"
          data-net="Etisalat"
        >
          اتصالات
        </button>

      </div>

      <div
        class="form"
        style="margin-top:14px"
      >

        <input
          id="balanceAmount"
          type="number"
          min="9"
          max="500"
          placeholder="اكتب قيمة الدفع من 9 لـ 500"
          oninput="calcBalanceValue()"
        >

        <div
          class="glass card"
          style="
            padding:14px;
            margin-top:10px;
          "
        >

          <div
            style="
              display:flex;
              justify-content:space-between;
            "
          >

            <span>
              قيمة الدفع:
            </span>

            <b id="payValue">
              0 جنيه
            </b>

          </div>

          <div
            style="
              display:flex;
              justify-content:space-between;
              margin-top:8px;
            "
          >

            <span>
              بعد خصم 7 جنيه:
            </span>

            <b id="afterFee">
              0 جنيه
            </b>

          </div>

          <div
            style="
              display:flex;
              justify-content:space-between;
              margin-top:8px;
            "
          >

            <span>
              الرصيد المتوقع:
            </span>

            <b id="balanceValue">
              0 رصيد
            </b>

          </div>

        </div>

        <button
          class="btn"
          style="margin-top:14px"
          onclick="addBalanceToCart()"
        >

          إضافة للسلة

        </button>

      </div>

    </div>

  `;
}

function calcBalanceValue() {

  const amount = Number(

    document.getElementById(
      "balanceAmount"
    )?.value || 0

  );

  const after =
    Math.max(amount - 7, 0);

  const balance =
    Math.floor(after * 0.74);

  document.getElementById(
    "payValue"
  ).innerText =
    amount + " جنيه";

  document.getElementById(
    "afterFee"
  ).innerText =
    after + " جنيه";

  document.getElementById(
    "balanceValue"
  ).innerText =
    balance + " رصيد";
}

function addBalanceToCart() {

  const amount = Number(

    document.getElementById(
      "balanceAmount"
    )?.value || 0

  );

  if (amount < 9) {

    return toast(
      "أقل قيمة دفع 9 جنيه"
    );
  }

  if (amount > 500) {

    return toast(
      "أقصى قيمة دفع 500 جنيه"
    );
  }

  const activeBtn =
    document.querySelector(
      ".network-btn.active"
    );

  const network =
    activeBtn?.dataset.net
    ||
    "Vodafone";

  const after =
    amount - 7;

  const balance =
    Math.floor(after * 0.74);

  const item = {

    id:
      "mobile-balance-" + Date.now(),

    game:
      "رصيد",

    name:
      `رصيد ${network}`,

    price:
      amount,

    playerId:
      network,

    balanceValue:
      balance,

    image:
      "vod.png"
  };

  let cart = JSON.parse(

    localStorage.getItem("cart")
    ||
    "[]"

  );

  cart.push(item);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  toast(
    `تم إضافة ${balance} رصيد للسلة`
  );
}

function applyFilters() {

  const q =
    searchBox.value
    .toLowerCase()
    .trim();

  const list =
    PRODUCTS.filter(p => {

      const text =

        `${p.game}
        ${p.name}
        ${p.category}`

        .toLowerCase();

      return (

        (

          currentCategory === "all"

          ||

          p.category === currentCategory

        )

        &&

        (

          currentGame === "all"

          ||

          p.game === currentGame

        )

        &&

        text.includes(q)

        &&

        p.game !== "رصيد"

      );

    });

  resultCount.textContent =

    `عرض ${list.length}
    من ${PRODUCTS.length}
    منتج`;

  products.innerHTML =

    mobileBalanceCard()

    +

    (

      list.length

      ?

      list.map(p =>

        productCard(
          p,
          PRODUCTS.indexOf(p)
        )

      ).join("")

      :

      `
      <div class='glass card'>

        لا توجد منتجات مطابقة.

      </div>
      `
    );

  document
    .querySelectorAll(".network-btn")
    .forEach(btn => {

      btn.onclick = () => {

        document
          .querySelectorAll(".network-btn")
          .forEach(b =>

            b.classList.remove("active")

          );

        btn.classList.add("active");
      };

    });
}

async function initStore() {

  renderSkeleton(
    "products",
    8
  );

  await loadProductsFromDB();

  currentCategory =
    getUrlCat();

  renderCategoryFilters();

  renderGameFilters();

  applyFilters();
}

initStore();

</script>

</body>
</html>
