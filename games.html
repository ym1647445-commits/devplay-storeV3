<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شحن الألعاب - DevPlay</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial;background:#f5f6fb;color:#111827}
a{text-decoration:none;color:inherit}

header{
background:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;
box-shadow:0 5px 20px #0001;position:sticky;top:0;z-index:10
}
.logo{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:bold;color:#5b35f5}
.logo img{width:55px;height:55px;object-fit:contain}
nav{display:flex;gap:12px;flex-wrap:wrap}
nav a{padding:10px 15px;border-radius:12px;font-weight:bold}
nav a:hover{background:#5b35f5;color:white}

.hero{
max-width:1150px;margin:25px auto;padding:35px;border-radius:30px;
background:linear-gradient(135deg,#5b35f5,#00b7ff);color:white;text-align:center
}
.hero h1{font-size:42px;margin:0 0 10px}
.hero p{font-size:19px}

.container{max-width:1150px;margin:auto;padding:0 20px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin:25px 0}
.filters button{
border:0;background:white;padding:12px 18px;border-radius:14px;font-weight:bold;cursor:pointer;
box-shadow:0 8px 20px #0001
}
.filters button.active,.filters button:hover{background:#5b35f5;color:white}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:white;border-radius:24px;overflow:hidden;box-shadow:0 10px 30px #0001;position:relative
}
.card img{width:100%;height:140px;object-fit:cover;background:#eee}
.body{padding:17px}
.badge{
position:absolute;top:12px;right:12px;background:#ff7a18;color:white;padding:6px 10px;
border-radius:999px;font-size:12px;font-weight:bold
}
.game{color:#5b35f5;font-weight:bold;font-size:14px}
h3{margin:8px 0;font-size:22px}
.price{font-size:24px;color:#ff7a18;font-weight:bold;margin:10px 0}
.add{
width:100%;border:0;background:#5b35f5;color:white;padding:12px;border-radius:14px;
font-weight:bold;cursor:pointer;font-size:15px
}
.add:hover{background:#4326c9}

.cart{
position:fixed;bottom:20px;left:20px;background:#111827;color:white;padding:14px 20px;
border-radius:18px;box-shadow:0 10px 30px #0004;font-weight:bold;z-index:20
}
.cart span{background:#5b35f5;border-radius:999px;padding:3px 9px;margin-right:6px}

.modal{
display:none;position:fixed;inset:0;background:#0008;z-index:50;align-items:center;justify-content:center;padding:15px
}
.box{
background:white;width:min(420px,100%);border-radius:24px;padding:22px
}
.box h2{margin-top:0;color:#5b35f5}
input{width:100%;padding:13px;border:1px solid #ddd;border-radius:13px;margin:10px 0}
.close{background:#eee;color:#111;border:0;border-radius:10px;padding:8px 12px;float:left;cursor:pointer}

@media(max-width:700px){
header{flex-direction:column;gap:10px}
.hero h1{font-size:30px}
.cart{left:10px;right:10px;text-align:center}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
DevPlay
</div>

<nav>
<a href="index.html">الرئيسية</a>
<a href="games.html">شحن الألعاب</a>
<a href="account.html">حسابي</a>
<a href="track.html">تتبع الطلب</a>
<a href="cart.html">السلة</a>
</nav>
</header>

<section class="hero">
<h1>🎮 شحن الألعاب والخدمات</h1>
<p>اختار الباقة، اكتب بيانات اللعبة، وضيفها للسلة</p>
</section>

<main class="container">

<div class="filters">
<button class="active" onclick="filterProducts('all',this)">الكل</button>
<button onclick="filterProducts('popular',this)">الأشهر 🔥</button>
<button onclick="filterProducts('PUBG',this)">PUBG</button>
<button onclick="filterProducts('Free Fire',this)">Free Fire</button>
<button onclick="filterProducts('COD',this)">COD</button>
<button onclick="filterProducts('Yalla Ludo',this)">Yalla Ludo</button>
<button onclick="filterProducts('Honor of Kings',this)">Honor</button>
<button onclick="filterProducts('Steam',this)">Steam</button>
<button onclick="filterProducts('Anghami',this)">Anghami</button>
</div>

<div class="products" id="products"></div>

</main>

<a class="cart" href="cart.html">
السلة <span id="cartCount">0</span>
</a>

<div class="modal" id="modal">
<div class="box">
<button class="close" onclick="closeModal()">×</button>
<h2>إضافة للسلة</h2>
<p id="modalInfo"></p>
<input id="playerInput" placeholder="اكتب البيانات المطلوبة">
<button class="add" onclick="confirmAdd()">إضافة للسلة</button>
</div>
</div>

<script>
const products = [
{game:"PUBG",name:"60 UC",price:50,img:"pubg.png",need:"ID ببجي",popular:true},
{game:"PUBG",name:"325 UC",price:220,img:"pubg.png",need:"ID ببجي",popular:true},
{game:"PUBG",name:"660 UC",price:430,img:"pubg.png",need:"ID ببجي"},
{game:"PUBG",name:"1800 UC",price:1080,img:"pubg.png",need:"ID ببجي",popular:true},

{game:"Free Fire",name:"100 جوهرة",price:65,img:"free_fire.png",need:"ID فري فاير",popular:true},
{game:"Free Fire",name:"210 جوهرة",price:125,img:"free_fire.png",need:"ID فري فاير"},
{game:"Free Fire",name:"530 جوهرة",price:300,img:"free_fire.png",need:"ID فري فاير"},

{game:"COD",name:"30 CP",price:25,img:"cod.png",need:"ID كول أوف ديوتي",popular:true},
{game:"COD",name:"80 CP",price:60,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"420 CP",price:240,img:"cod.png",need:"ID كول أوف ديوتي",popular:true},
{game:"COD",name:"880 CP",price:570,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"2400 CP",price:1150,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"5000 CP",price:2300,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"10800 CP",price:4550,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"21600 CP",price:9100,img:"cod.png",need:"ID كول أوف ديوتي"},
{game:"COD",name:"Battle Pass Premium",price:150,img:"cod.png",need:"ID كول أوف ديوتي",popular:true},
{game:"COD",name:"Battle Pass Premium Bundle",price:320,img:"cod.png",need:"ID كول أوف ديوتي"},

{game:"Yalla Ludo",name:"830 ماسة",price:140,img:"yalla.png",need:"ID اللعبة",popular:true},
{game:"Yalla Ludo",name:"2320 ماسة",price:320,img:"yalla.png",need:"ID اللعبة"},
{game:"Yalla Ludo",name:"5150 ماسة",price:630,img:"yalla.png",need:"ID اللعبة"},
{game:"Yalla Ludo",name:"13,580 ماسة",price:1530,img:"yalla.png",need:"ID اللعبة"},
{game:"Yalla Ludo",name:"27,640 ماسة",price:3000,img:"yalla.png",need:"ID اللعبة"},
{game:"Yalla Ludo",name:"55,800 ماسة",price:6000,img:"yalla.png",need:"ID اللعبة"},

{game:"Honor of Kings",name:"16 توكن",price:15,img:"honor.png",need:"ID اللعبة",popular:true},
{game:"Honor of Kings",name:"80 توكن",price:65,img:"honor.png",need:"ID اللعبة"},
{game:"Honor of Kings",name:"240 توكن",price:180,img:"honor.png",need:"ID اللعبة"},
{game:"Honor of Kings",name:"400 توكن",price:300,img:"honor.png",need:"ID اللعبة"},

{game:"Honor of Kings",name:"4000 + 180 توكن",price:2800,img:"honor.png",need:"ID اللعبة"},

{game:"Steam",name:"5$",price:320,img:"steam.png",need:"إيميل Steam",popular:true},
{game:"Steam",name:"10$",price:640,img:"steam.png",need:"إيميل Steam"},
{game:"Steam",name:"20$",price:1150,img:"steam.png",need:"إيميل Steam"},
{game:"Steam",name:"25$",price:1580,img:"steam.png",need:"إيميل Steam"},
{game:"Steam",name:"30$",price:1830,img:"steam.png",need:"إيميل Steam"},
{game:"Steam",name:"50$",price:3000,img:"steam.png",need:"إيميل Steam"},
{game:"Steam",name:"100$",price:6280,img:"steam.png",need:"إيميل Steam"},

{game:"Anghami",name:"اشتراك شهر",price:160,img:"Anghami.png",need:"رقم موبايل أنغامي",popular:true},
{game:"Anghami",name:"اشتراك 3 شهور",price:450,img:"Anghami.png",need:"رقم موبايل أنغامي"}
];

let selectedProduct = null;

function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();
}

function updateCartCount(){
document.getElementById("cartCount").innerText = getCart().length;
}

function renderProducts(list = products){
document.getElementById("products").innerHTML = list.map((p,index)=>`
<div class="card">
${p.popular ? `<span class="badge">الأكثر طلبًا</span>` : ""}
<img src="${p.img}" alt="${p.game}">
<div class="body">
<div class="game">${p.game}</div>
<h3>${p.name}</h3>
<div class="price">${p.price} جنيه</div>
<button class="add" onclick="openModal(${products.indexOf(p)})">+ أضف للسلة</button>
</div>
</div>
`).join("");
}

function filterProducts(type,btn){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

if(type === "all") renderProducts(products);
else if(type === "popular") renderProducts(products.filter(p=>p.popular));
else renderProducts(products.filter(p=>p.game === type));
}

function openModal(index){
selectedProduct = products[index];
document.getElementById("modalInfo").innerHTML =
`<b>${selectedProduct.game}</b><br>${selectedProduct.name}<br>${selectedProduct.price} جنيه<br><br>المطلوب: ${selectedProduct.need}`;

document.getElementById("playerInput").placeholder = selectedProduct.need;
document.getElementById("playerInput").value = "";
document.getElementById("modal").style.display = "flex";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

function confirmAdd(){
const value = document.getElementById("playerInput").value.trim();

if(!value){
alert("اكتب البيانات المطلوبة الأول");
return;
}

const cart = getCart();

cart.push({
game:selectedProduct.game,
name:selectedProduct.name,
price:selectedProduct.price,
playerId:value
});

saveCart(cart);

alert("تمت الإضافة للسلة ❤️");
closeModal();
}

renderProducts();
updateCartCount();
</script>

</body>
</html>
