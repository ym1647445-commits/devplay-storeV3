<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة الإدارة</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></head><body><div id="top"></div><section class="section container"><div id="guard" class="glass card" style="max-width:480px;margin:auto"><h2>دخول الأدمن</h2><input id="pass" type="password" placeholder="كلمة السر"><button class="btn" onclick="enter()">دخول</button></div><div id="panel" style="display:none"><div class="grid"><div class="glass card"><h3 id="totalOrders">0</h3><p class="muted">إجمالي الطلبات</p></div><div class="glass card"><h3 id="pendingOrders">0</h3><p class="muted">قيد المراجعة</p></div><div class="glass card"><h3 id="shippedOrders">0</h3><p class="muted">تم الشحن</p></div><div class="glass card"><h3 id="revenue">0</h3><p class="muted">إجمالي تقريبي</p></div></div><div class="glass card" style="margin-top:16px"><div class="filters"><input id="search" oninput="apply()" placeholder="بحث"><select id="status" onchange="apply()"><option value="all">كل الحالات</option><option value="pending">قيد المراجعة</option><option value="shipped">تم الشحن</option><option value="rejected">مرفوض</option></select><button class="btn" onclick="load()">تحديث</button><a class="btn dark" href="posts-admin.html">إدارة العروض</a></div></div><div id="orders" style="margin-top:16px"></div></div></section><div id="foot"></div><div id="toast" class="toast"></div><script>top.innerHTML=header("admin");foot.innerHTML=footer();</script><script>let all=[];function enter(){if(pass.value!==ADMIN_PASSWORD)return alert("كلمة السر غلط");guard.style.display="none";panel.style.display="block";load()}function group(rows){const g={};rows.forEach(r=>{(g[r.order_code]||(g[r.order_code]=[])).push(r)});return Object.values(g)}async function load(){const {data,error}=await client.from("orders").select("*").order("created_at",{ascending:false});if(error)return alert(error.message);all=data||[];stats();apply()}function stats(){const groups=group(all);totalOrders.textContent=groups.length;pendingOrders.textContent=groups.filter(g=>g[0].status==="pending").length;shippedOrders.textContent=groups.filter(g=>g[0].status==="shipped").length;revenue.textContent=all.reduce((s,o)=>s+Number(o.price||0),0)+" جنيه"}function apply(){const q=search.value.toLowerCase(),s=status.value;const rows=all.filter(o=>(s==="all"||o.status===s)&&`${o.order_code} ${o.customer_name} ${o.phone} ${o.game} ${o.player_id}`.toLowerCase().includes(q));render(group(rows))}function render(groups){orders.innerHTML=groups.length?groups.map(g=>{const f=g[0],phone=String(f.phone||"").replace(/\D/g,""),wa=phone.startsWith("0")?"20"+phone.slice(1):phone,msg=encodeURIComponent(`تم تحديث طلبك في DevPlay ✅\nرقم الطلب: ${f.order_code}\nالحالة: ${statusText(f.status)}\n${WHATSAPP_CHANNEL}`);return `<div class="glass card" style="margin-bottom:14px"><h3>${f.order_code} <span class="status ${statusClass(f.status)}">${statusText(f.status)}</span></h3><p><b>العميل:</b> ${f.customer_name||"-"} - ${f.phone||"-"}</p>${g.map(x=>`<div class="item-row"><b>${x.game}</b><span>${x.package} - ${x.player_id} - ${x.price||0}ج</span></div>`).join("")}<select onchange="updateStatus('${f.order_code}',this.value)"><option value="pending" ${f.status==="pending"?"selected":""}>قيد المراجعة</option><option value="shipped" ${f.status==="shipped"?"selected":""}>تم الشحن</option><option value="rejected" ${f.status==="rejected"?"selected":""}>مرفوض</option></select> <button class="btn green" onclick="window.open('https://wa.me/${wa}?text=${msg}','_blank')">واتساب</button> <button class="btn dark" onclick="navigator.clipboard.writeText('${g.map(x=>x.player_id).join(' / ')}');toast('تم النسخ')">نسخ البيانات</button></div>`}).join(""):"<div class='glass card'>لا توجد طلبات</div>"}async function updateStatus(code,status){const {error}=await client.from("orders").update({status}).eq("order_code",code);if(error)return alert(error.message);const userRows=all.filter(o=>o.order_code===code&&o.user_id);if(userRows[0])await client.from("notifications").insert([{user_id:userRows[0].user_id,title:"تحديث حالة الطلب",message:`طلبك ${code}: ${statusText(status)}`,type:"order"}]);load()}</script></body></html>
