<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <title>لوحة الإدارة - DevPlay</title>
</head>
<body>
<div id="top"></div>
<section class="section container">

  <div id="guard" class="glass card" style="max-width:480px;margin:auto">
    <h2>دخول الأدمن</h2>
    <div class="form">
      <input id="adminEmail" type="email" placeholder="إيميل الأدمن">
      <input id="adminPassword" type="password" placeholder="باسورد الأدمن">
      <button class="btn" onclick="adminLogin()">دخول</button>
    </div>
  </div>

  <div id="panel" style="display:none">
    <div class="grid">
      <div class="glass card"><h3 id="totalOrders">0</h3><p class="muted">إجمالي الطلبات</p></div>
      <div class="glass card"><h3 id="pendingOrders">0</h3><p class="muted">قيد المراجعة</p></div>
      <div class="glass card"><h3 id="shippedOrders">0</h3><p class="muted">تم الشحن</p></div>
      <div class="glass card"><h3 id="revenue">0</h3><p class="muted">إجمالي تقريبي</p></div>
    </div>

    <div class="glass card" style="margin-top:16px">
      <div class="filters">
        <input id="search" oninput="apply()" placeholder="بحث برقم الطلب / العميل / اللعبة / ID">
        <select id="status" onchange="apply()">
          <option value="all">كل الحالات</option>
          <option value="pending">قيد المراجعة</option>
          <option value="shipped">تم الشحن</option>
          <option value="rejected">مرفوض</option>
        </select>
        <button class="btn" onclick="load()">تحديث</button>
        <a class="btn dark" href="admin-products.html">إدارة المنتجات</a>
        <a class="btn dark" href="admin-wallet.html">إدارة المحفظة</a>
        <a class="btn" href="offers.html">العروض</a>
        <button class="btn red" onclick="adminLogout()">خروج الأدمن</button>
      </div>
    </div>

    <div id="orders" style="margin-top:16px"></div>
  </div>
</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("admin");
document.getElementById("foot").innerHTML = footer();

let all = [];

async function adminLogin() {
  const { data, error } = await client.rpc("check_admin_login", {
    admin_email: adminEmail.value.trim(),
    admin_password: adminPassword.value
  });

  if (error) return alert(error.message);
  if (data !== true) return alert("بيانات الأدمن غلط");

  sessionStorage.setItem("devplay_admin", "yes");
  guard.style.display = "none";
  panel.style.display = "block";
  if (typeof load === "function") load();
  if (typeof loadTopups === "function") loadTopups();
  if (typeof loadProductsAdmin === "function") loadProductsAdmin();
}

function adminLogout() {
  sessionStorage.removeItem("devplay_admin");
  location.reload();
}

function group(rows) {
  const groups = {};
  rows.forEach(row => {
    const code = row.order_code || "NO-CODE";
    if (!groups[code]) groups[code] = [];
    groups[code].push(row);
  });
  return Object.values(groups);
}

async function load() {
  search.value = "";
  status.value = "all";
  const { data, error } = await client.from("orders").select("*").order("created_at", { ascending: false });
  if (error) return alert(error.message);
  all = data || [];
  stats();
  render(group(all));
}

function stats() {
  const groups = group(all);
  totalOrders.textContent = groups.length;
  pendingOrders.textContent = groups.filter(g => g[0].status === "pending").length;
  shippedOrders.textContent = groups.filter(g => g[0].status === "shipped").length;
  revenue.textContent = all.reduce((sum, order) => sum + Number(order.price || 0), 0) + " جنيه";
}

function apply() {
  const q = (search.value || "").toLowerCase().trim();
  const s = status.value || "all";
  const rows = all.filter(order => {
    const text = `${order.order_code || ""} ${order.customer_name || ""} ${order.phone || ""} ${order.customer_phone || ""} ${order.game || ""} ${order.player_id || ""} ${order.package || ""} ${order.category || ""} ${order.status || ""}`.toLowerCase();
    return (q === "" || text.includes(q)) && (s === "all" || s === "" || order.status === s || !order.status);
  });
  render(group(rows));
}

function render(groups) {
  if (!groups.length) {
    orders.innerHTML = `<div class="glass card">لا توجد طلبات مطابقة.</div>`;
    return;
  }

  orders.innerHTML = groups.map(group => {
    const first = group[0];
    const phone = String(first.phone || first.customer_phone || "").replace(/\D/g, "");
    const whatsappPhone = phone.startsWith("0") ? "20" + phone.slice(1) : phone;
    const msg = encodeURIComponent(`تم تحديث طلبك في DevPlay ✅\nرقم الطلب: ${first.order_code}\nالحالة: ${statusText(first.status)}\n\n${WHATSAPP_CHANNEL}`);

    return `
      <div class="glass card" style="margin-bottom:14px">
        <h3>${first.order_code || "NO-CODE"} <span class="status ${statusClass(first.status)}">${statusText(first.status)}</span></h3>
        <p><b>العميل:</b> ${first.customer_name || "-"} - ${first.phone || first.customer_phone || "-"}</p>
        ${group.map(item => `<div class="item-row"><b>${item.game || "-"}</b><span>${item.package || "-"} - ${item.player_id || "-"} - ${item.price || 0}ج</span></div>`).join("")}
        <br>
        <select onchange="updateStatus('${first.order_code}', this.value)">
          <option value="pending" ${first.status === "pending" ? "selected" : ""}>قيد المراجعة</option>
          <option value="shipped" ${first.status === "shipped" ? "selected" : ""}>تم الشحن</option>
          <option value="rejected" ${first.status === "rejected" ? "selected" : ""}>مرفوض</option>
        </select>
        <button class="btn green" onclick="window.open('https://wa.me/${whatsappPhone}?text=${msg}', '_blank')">واتساب</button>
        <button class="btn dark" onclick="copyOrderData('${group.map(x => x.player_id || '').join(' / ')}')">نسخ البيانات</button>
        <button class="btn red" onclick="deleteOrder('${first.order_code}')">حذف الطلب</button>
      </div>
    `;
  }).join("");
}

async function updateStatus(code, newStatus) {

  const { data, error } = await client
    .from("orders")
    .update({ status: newStatus })
    .eq("order_code", code)
    .select();

  if (error) return alert(error.message);

  if (!data || !data.length)
    return alert("لم يتم تحديث أي طلب");

  const order = data[0];

  let customerEmail =
    order.email ||
    order.customer_email ||
    order.user_email ||
    "";

  if (!customerEmail && order.user_id) {
    const { data: profile } = await client
      .from("wallets")
      .select("email")
      .eq("user_id", order.user_id)
      .maybeSingle();

    customerEmail = profile?.email || "";
  }

  const emailType =
    newStatus === "shipped"
      ? "order_shipped"
      : newStatus === "rejected"
        ? "order_rejected"
        : "order_received";

  const productText =
    data.map(item =>
      `${item.game || "-"} - ${item.package || "-"}`
    ).join(" | ");

  const totalAmount =
    data.reduce((sum, item) => sum + Number(item.price || 0), 0);

  if (customerEmail) {
    try {
      await fetch(
        "https://bwtchfidnvlwyikhawua.supabase.co/functions/v1/send-email",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            to: customerEmail,
            name: order.customer_name || "عميل DevPlay",
            type: emailType,
            orderCode: order.order_code,
            product: productText,
            playerId: order.player_id || order.phone || order.customer_phone || "-",
            amount: totalAmount || order.price || 0,
            trackUrl: "https://devplaystudio.com/track.html"
          })
        }
      );
    } catch (e) {
      console.log("Email Error", e);
    }
  } else {
    console.log("No customer email found for order", code);
  }

  toast("تم تحديث الحالة وإرسال الإيميل ✅");

  all = all.map(order =>
    order.order_code === code
      ? { ...order, status: newStatus }
      : order
  );

  stats();
  render(group(all));
}

function copyOrderData(text) {
  navigator.clipboard.writeText(text);
  toast("تم النسخ");
}

async function deleteOrder(code) {
  if (!confirm("متأكدة من حذف الطلب؟")) return;
  const { error } = await client.from("orders").delete().eq("order_code", code);
  if (error) return alert(error.message);
  toast("تم حذف الطلب");
  load();
}

if (sessionStorage.getItem("devplay_admin") === "yes") {
  guard.style.display = "none";
  panel.style.display = "block";
  load();
}
</script>
</body>
</html>
