<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <title>إدارة المنتجات - DevPlay</title>
</head>
<body>
<div id="top"></div>

<section class="section container">

  <div id="guard" class="glass card" style="max-width:480px;margin:auto">
    <h2>دخول الأدمن</h2>
    <div class="form">
      <input id="adminEmail" type="email" placeholder="إيميل الأدمن">
      <input id="adminPassword" type="password" placeholder="باسورد الأدمن">
      <button class="btn" onclick="adminLogin()">دخول</button>
    </div>
  </div>

  <div id="panel" style="display:none">

    <div class="glass card">
      <h2>إدارة السلع والمنتجات</h2>

      <div class="grid">
        <input id="game" placeholder="اسم اللعبة / الخدمة">
        <input id="name" placeholder="اسم الباقة">
        <input id="price" type="number" step="0.01" placeholder="السعر">
        <input id="img" placeholder="اسم الصورة مثل pubg.png">
        <input id="need" placeholder="المطلوب من العميل">
        <input id="offer_label" placeholder="عرض / لابل اختياري">

        <select id="category">
          <option value="games">ألعاب</option>
          <option value="fakka">كروت فكة</option>
          <option value="cards">بطاقات</option>
          <option value="other">أخرى</option>
        </select>

        <select id="popular">
          <option value="false">عادي</option>
          <option value="true">مميز</option>
        </select>

        <select id="active">
          <option value="true">ظاهر</option>
          <option value="false">مخفي</option>
        </select>
      </div>

      <br>

      <button class="btn" onclick="saveProduct()">حفظ المنتج</button>
      <button class="btn dark" onclick="clearProductForm()">تفريغ</button>
      <a class="btn dark" href="admin.html">طلبات الأدمن</a>
      <a class="btn dark" href="admin-wallet.html">إدارة المحفظة</a>
      <a class="btn dark" href="posts-admin.html">إدارة العروض</a>
      <a class="btn dark" href="admin-coupons.html">إدارة القسايم</a>
      <button class="btn red" onclick="adminLogout()">خروج الأدمن</button>
    </div>

    <div class="glass card" style="margin-top:18px">
      <h2>كل المنتجات</h2>
      <input id="productSearch" placeholder="بحث في المنتجات" oninput="renderProducts()">
      <div id="productsList" style="margin-top:16px"></div>
    </div>

  </div>
</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("admin");
document.getElementById("foot").innerHTML = footer();

let adminProducts = [];
let editingProductId = null;

async function adminLogin() {
  const { data, error } = await client.rpc("check_admin_login", {
    admin_email: adminEmail.value.trim(),
    admin_password: adminPassword.value
  });

  if (error) return alert(error.message);
  if (data !== true) return alert("بيانات الأدمن غلط");

  const adminOk = await requireAdminPage();
  if (!adminOk) return;

  sessionStorage.setItem("devplay_admin", "yes");
  guard.style.display = "none";
  panel.style.display = "block";
  loadProductsAdmin();
}

function adminLogout() {
  sessionStorage.removeItem("devplay_admin");
  location.reload();
}

function categoryLabel(cat) {
  const map = {
    games: "ألعاب",
    mobile: "رصيد",
    fakka: "كروت فكة",
    cards: "بطاقات",
    other: "أخرى"
  };

  return map[cat] || cat || "-";
}

async function loadProductsAdmin() {
  const adminOk = await requireAdminPage();
  if (!adminOk) return;

  const { data, error } = await client
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) return alert(error.message);

  adminProducts = data || [];
  renderProducts();
}

function renderProducts() {
  const q = productSearch.value.toLowerCase().trim();

  const list = adminProducts.filter(p =>
    `${p.game || ""} ${p.name || ""} ${p.category || ""} ${p.price || ""}`.toLowerCase().includes(q)
  );

  productsList.innerHTML = list.length
    ? list.map(p => `
      <div class="glass card" style="margin-bottom:12px">
        <div class="item-row">
          <div>
            <h3>${p.game}</h3>
            <p class="muted">${p.name}</p>
            <p>${p.price} جنيه - ${categoryLabel(p.category)}</p>
            <p class="muted">المطلوب: ${p.need || "-"}</p>
            <p class="muted">الصورة: ${p.img || "-"}</p>
            <p class="muted">الحالة: ${p.active !== false ? "ظاهر" : "مخفي"}</p>
          </div>

          <div>
            <button class="btn" onclick="fillEdit(${p.id})">تعديل</button>
            <button class="btn dark" onclick="toggleProduct(${p.id}, ${p.active !== false})">${p.active !== false ? "إخفاء" : "إظهار"}</button>
            <button class="btn red" onclick="deleteProduct(${p.id})">حذف</button>
          </div>
        </div>
      </div>
    `).join("")
    : "<p class='muted'>لا توجد منتجات.</p>";
}

function fillEdit(id) {
  const p = adminProducts.find(x => x.id === id);
  if (!p) return;

  game.value = p.game || "";
  name.value = p.name || "";
  price.value = p.price || "";
  img.value = p.img || "";
  need.value = p.need || "";
  offer_label.value = p.offer_label || "";
  category.value = p.category || "games";
  popular.value = String(!!p.popular);
  active.value = String(p.active !== false);
  editingProductId = id;

  toast("عدلي البيانات واضغطي حفظ المنتج");
}

function clearProductForm() {
  editingProductId = null;
  game.value = "";
  name.value = "";
  price.value = "";
  img.value = "";
  need.value = "";
  offer_label.value = "";
  category.value = "games";
  popular.value = "false";
  active.value = "true";
}

async function saveProduct() {
  const body = {
    game: game.value.trim(),
    name: name.value.trim(),
    price: Number(price.value),
    img: img.value.trim() || "logo.png",
    need: need.value.trim() || "بيانات الطلب",
    category: category.value,
    popular: popular.value === "true",
    offer_label: offer_label.value.trim() || null,
    active: active.value === "true"
  };

  if (!body.game || !body.name || !body.price) {
    return toast("اكتبي اسم الخدمة والباقة والسعر");
  }

  let error;

  if (editingProductId) {
    const res = await client
      .from("products")
      .update(body)
      .eq("id", editingProductId);

    error = res.error;
  } else {
    const res = await client
      .from("products")
      .insert([body]);

    error = res.error;
  }

  if (error) return alert(error.message);

  toast("تم الحفظ ✅");
  clearProductForm();
  loadProductsAdmin();
}

async function toggleProduct(id, isActive) {
  const { error } = await client
    .from("products")
    .update({ active: !isActive })
    .eq("id", id);

  if (error) return alert(error.message);

  loadProductsAdmin();
}

async function deleteProduct(id) {
  if (!confirm("حذف المنتج؟")) return;

  const { error } = await client
    .from("products")
    .delete()
    .eq("id", id);

  if (error) return alert(error.message);

  loadProductsAdmin();
}

if (sessionStorage.getItem("devplay_admin") === "yes") {
  requireAdminPage().then(ok => {
    if (!ok) return;

    guard.style.display = "none";
    panel.style.display = "block";
    loadProductsAdmin();
  });
}
</script>
</body>
</html>
