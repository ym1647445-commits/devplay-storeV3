<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المنتجات - DevPlay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="top"></div>

  
<section class="section container">
  <div class="glass card">
    <h2>إدارة المنتجات</h2>
    <p class="muted">من هنا تضيفي وتعدلي وتخفي المنتجات من المتجر.</p>

    <div class="grid">
      <input id="game" placeholder="اسم اللعبة / الخدمة">
      <input id="name" placeholder="اسم الباقة">
      <input id="price" type="number" step="0.01" placeholder="السعر">
      <input id="img" placeholder="اسم الصورة مثل pubg.png">
      <input id="need" placeholder="المطلوب من العميل: ID أو رقم أو إيميل">
      <input id="offer_label" placeholder="عرض / لابل اختياري">

      <select id="category">
        <option value="games">ألعاب</option>
        <option value="mobile">رصيد</option>
        <option value="fakka">فكة</option>
        <option value="cards">بطاقات</option>
      </select>

      <select id="popular">
        <option value="false">عادي</option>
        <option value="true">مميز</option>
      </select>
    </div>

    <br>
    <button class="btn" onclick="saveProduct()">حفظ المنتج</button>
  </div>

  <div class="glass card" style="margin-top:18px">
    <h2>كل المنتجات</h2>
    <input id="productSearch" placeholder="بحث في المنتجات" oninput="renderProducts()">
    <div id="productsList" style="margin-top:16px"></div>
  </div>
</section>


  <div id="foot"></div>
  <div id="toast" class="toast"></div>

  <script>
    document.getElementById("top").innerHTML = header("admin");
    document.getElementById("foot").innerHTML = footer();
  </script>

  
<script>
let adminProducts = [];
let editingProductId = null;

async function loadProductsAdmin() {
  const { data, error } = await client
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) return alert(error.message);

  adminProducts = data || [];
  renderProducts();
}

function renderProducts() {
  const q = productSearch.value.toLowerCase().trim();

  const list = adminProducts.filter(p => {
    const text = `${p.game} ${p.name} ${p.category} ${p.price}`.toLowerCase();
    return text.includes(q);
  });

  productsList.innerHTML =
    list.length
      ? list.map(p => `
        <div class="glass card" style="margin-bottom:12px">
          <div class="item-row">
            <div>
              <h3>${p.game}</h3>
              <p class="muted">${p.name}</p>
              <p>${p.price} جنيه - ${categoryLabel(p.category)}</p>
              <p class="muted">المطلوب: ${p.need || "-"}</p>
              <p class="muted">الحالة: ${p.active ? "ظاهر" : "مخفي"}</p>
            </div>

            <div>
              <button class="btn" onclick="fillEdit(${p.id})">تعديل</button>
              <button class="btn dark" onclick="toggleProduct(${p.id}, ${p.active})">${p.active ? "إخفاء" : "إظهار"}</button>
              <button class="btn red" onclick="deleteProduct(${p.id})">حذف</button>
            </div>
          </div>
        </div>
      `).join("")
      : "<p class='muted'>لا توجد منتجات.</p>";
}

function fillEdit(id) {
  const p = adminProducts.find(x => x.id === id);
  if (!p) return;

  game.value = p.game || "";
  name.value = p.name || "";
  price.value = p.price || "";
  img.value = p.img || "";
  need.value = p.need || "";
  offer_label.value = p.offer_label || "";
  category.value = p.category || "games";
  popular.value = String(!!p.popular);

  editingProductId = id;
  toast("عدلي البيانات واضغطي حفظ المنتج");
}

async function saveProduct() {
  const body = {
    game: game.value,
    name: name.value,
    price: Number(price.value),
    img: img.value || "logo.png",
    need: need.value || "بيانات الطلب",
    category: category.value,
    popular: popular.value === "true",
    offer_label: offer_label.value || null,
    active: true
  };

  if (!body.game || !body.name || !body.price) {
    return toast("اكتبي اسم الخدمة والباقة والسعر");
  }

  let error;

  if (editingProductId) {
    const res = await client
      .from("products")
      .update(body)
      .eq("id", editingProductId);

    error = res.error;
    editingProductId = null;
  } else {
    const res = await client
      .from("products")
      .insert([body]);

    error = res.error;
  }

  if (error) return alert(error.message);

  toast("تم الحفظ ✅");

  game.value = "";
  name.value = "";
  price.value = "";
  img.value = "";
  need.value = "";
  offer_label.value = "";

  loadProductsAdmin();
}

async function toggleProduct(id, active) {
  const { error } = await client
    .from("products")
    .update({ active: !active })
    .eq("id", id);

  if (error) return alert(error.message);

  loadProductsAdmin();
}

async function deleteProduct(id) {
  if (!confirm("حذف المنتج؟")) return;

  const { error } = await client
    .from("products")
    .delete()
    .eq("id", id);

  if (error) return alert(error.message);

  loadProductsAdmin();
}

loadProductsAdmin();
</script>

</body>
</html>
