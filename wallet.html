<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إضافة رصيد</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>

<body>

<div id="top"></div>

<section class="section container">

  <div class="glass card" style="max-width:650px;margin:auto">

    <h2>إضافة رصيد للمحفظة 💰</h2>

    <p class="muted">
      حوّل على فودافون كاش ثم ارفع صورة التحويل. الصورة إجبارية.
    </p>

    <p>
      رقم فودافون كاش:
      <b class="num">010 359 66569</b>
    </p>

    <div class="form">

      <label>الاسم</label>
      <input id="customerName" placeholder="اسمك">

      <label>رقم الهاتف اللي حولت منه</label>
      <input id="transferPhone" placeholder="010xxxxxxxx">

      <label>المبلغ المحول</label>
      <input id="amount" type="number" placeholder="مثال: 100">

      <label>رقم العملية / آخر 4 أرقام</label>
      <input id="paymentCode" placeholder="اختياري">

      <label>صورة التحويل</label>
      <input id="proof" type="file" accept="image/*">

      <button class="btn" onclick="sendTopup()">
        إرسال طلب إضافة الرصيد
      </button>

    </div>

  </div>

</section>

<div id="foot"></div>
<div id="toast" class="toast"></div>

<script>
document.getElementById("top").innerHTML = header("account");
document.getElementById("foot").innerHTML = footer();

async function sendTopup() {
  const user = await currentUser();

  if (!customerName.value.trim()) {
    return toast("اكتبي الاسم");
  }

  if (!transferPhone.value.trim()) {
    return toast("اكتبي الرقم اللي حولتي منه");
  }

  if (!amount.value || Number(amount.value) <= 0) {
    return toast("اكتبي المبلغ");
  }

  if (!proof.files[0]) {
    return toast("صورة التحويل إجبارية");
  }

  const file = proof.files[0];

  const fileName =
    Date.now() + "-" + file.name.replaceAll(" ", "-");

  const { error: uploadError } = await client
    .storage
    .from("transfer_proofs")
    .upload(fileName, file);

  if (uploadError) {
    return alert(uploadError.message);
  }

  const { data: urlData } = client
    .storage
    .from("transfer_proofs")
    .getPublicUrl(fileName);

  const proofUrl = urlData.publicUrl;

  const body = {
    user_id: user ? user.id : null,
    customer_name: customerName.value,
    customer_email: user ? user.email : null,
    transfer_phone: transferPhone.value,
    amount: Number(amount.value),
    payment_code: paymentCode.value,
    proof_url: proofUrl,
    status: "pending"
  };

  const { error } = await client
    .from("wallet_topups")
    .insert([body]);

  if (error) {
    return alert(error.message);
  }

  const msg =
`💰 طلب إضافة رصيد جديد

👤 العميل: ${customerName.value}
📱 الرقم المحول منه: ${transferPhone.value}
💵 المبلغ: ${amount.value} جنيه
🧾 رقم العملية: ${paymentCode.value || "غير مكتوب"}

📸 صورة التحويل:
${proofUrl}`;

  if (
    typeof WALLET_BOT_TOKEN !== "undefined" &&
    typeof WALLET_CHAT_ID !== "undefined" &&
    WALLET_BOT_TOKEN &&
    WALLET_CHAT_ID
  ) {
    fetch(`https://api.telegram.org/bot${WALLET_BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: WALLET_CHAT_ID,
        text: msg
      })
    });
  }

  toast("تم إرسال طلب إضافة الرصيد ✅");

  setTimeout(() => {
    location.href = "account.html";
  }, 1000);
}
</script>

</body>
</html>
